<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="">
        <caption>Table Demonstration</caption>
        <colgroup>
            <col span="4" style="background-color: aquamarine;">
        </colgroup>
        <!-- tr: Table Row -->
         <thead>
            <tr>
            <!-- th: table heading -->
                <th>col-1</th>
                <th>col-2</th>
                <th>col-3</th>
                <th>col-4</th>
         </tr>
         </thead>
         <tbody>
            <tr>
            <!-- td: table data/column -->
                <!-- <td rowspan="3">1</td> -->
                <!-- <td colspan="3">1</td> -->
                <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
            </tr>
            <tr>
                <td>2</td>
                <td>3</td>
                <td>4</td>
                <td>1</td>
            </tr>
            <tr>
                <td>3</td>
                <td>4</td>
                <td>1</td>
                <td>2</td>
            </tr>
            <tr>
                <td>4</td>
                <td>1</td>
                <td>2</td>
                <td>3</td>
            </tr>
         </tbody>
         <tfoot>
            <tr>
                <td>a1</td>
                <td>a2</td>
                <td>a3</td>
                <td>a4</td>
            </tr>
         </tfoot>
    </table>
</body>
</html>
